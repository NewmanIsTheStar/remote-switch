<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: "Lato", sans-serif;
  font-size: 25px;
}


.sidenav {
  height: 100%;
  width: 160px;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: #111;
  overflow-x: hidden;
  padding-top: 120px;
}

.sidenav a {
  padding: 6px 8px 6px 16px;
  text-decoration: none;
  font-size: 25px;
  color: #818181;
  display: block;
}

.sidenav a:hover {
  color: #f1f1f1;
}

.main {
  margin-left: 160px; /* Same as the width of the sidenav */
  font-size: 28px; /* Increased text to enable scrolling */
  input[type='text'] { font-size: 28px; }
  padding: 0px 10px;
}

@media screen and (max-height: 450px) {
  .sidenav {padding-top: 15px;}
  .sidenav a {font-size: 18px;}
}
</style>
</head>
<body>

  <div class="sidenav">
    <a href="/rs_relay_default.shtml">Control</a>
    <a href="/network.shtml">Network</a>   
    <a href="/time.shtml">Time</a>
    <a href="/rs_gpio.shtml">GPIO</a>
    <a href="/rs_names.shtml">Names</a>      
    <a href="/rs_schedule.shtml">Schedule</a>  
    <a href="/syslog.shtml">Syslog</a>    
    <a href="/units.shtml">Foibles</a>     
    <a href="/status.shtml">Status</a>    
  </div>

<div class="main">

  <h2>Relay GPIO Settings</h2>  
  <table>
      <form action="/rs_gpio.cgi">
          <tr>
              <td><label for="ecoip">Number of Relays</label></td>
              <td><input type="text" id="rsmax" name="rsmax" value="<!--#rsmax-->"></td>
          </tr>
          <tr>            
              <td>
                  <button type="submit" style="font-size: 25px;">Save</button>
              </td>
          </tr>          
      </form>
  </table> 
  <br>   
  <table>
      <form action="/rs_gpio.cgi">
          <tr>
              <td><label for="wind" <!--#rs1viz--> >Relay 1 GPIO:</label></td>
              <td><input type="text" is="rs1gpio" name="rs1gpio" value="<!--#rs1gpio-->" <!--#rs1viz--> ></td>
          </tr>         
          <tr>
              <td><label for="wind" <!--#rs2viz--> >Relay 2 GPIO:</label></td>
              <td><input type="text" is="rs2gpio" name="rs2gpio" value="<!--#rs2gpio-->" <!--#rs2viz--> ></td>
          </tr>      
          <tr>
              <td><label for="wind" <!--#rs3viz--> >Relay 3 GPIO:</label></td>
              <td><input type="text" is="rs3gpio" name="rs3gpio" value="<!--#rs3gpio-->" <!--#rs3viz--> ></td>
          </tr>                        
          <tr>
              <td><label for="wind" <!--#rs4viz--> >Relay 4 GPIO:</label></td>
              <td><input type="text" is="rs4gpio" name="rs4gpio" value="<!--#rs4gpio-->" <!--#rs4viz--> ></td>
          </tr>      
          <tr>
              <td><label for="wind" <!--#rs5viz--> >Relay 5 GPIO:</label></td>
              <td><input type="text" is="rs5gpio" name="rs5gpio" value="<!--#rs5gpio-->" <!--#rs5viz--> ></td>
          </tr>    
          <tr>
              <td><label for="wind" <!--#rs6viz--> >Relay 6 GPIO:</label></td>
              <td><input type="text" is="rs6gpio" name="rs6gpio" value="<!--#rs6gpio-->" <!--#rs6viz--> ></td>
          </tr>  
          <tr>
              <td><label for="wind" <!--#rs7viz--> >Relay 7 GPIO:</label></td>
              <td><input type="text" is="rs7gpio" name="rs7gpio" value="<!--#rs7gpio-->" <!--#rs7viz--> ></td>
          </tr>  
          <tr>
              <td><label for="wind" <!--#rs8viz--> >Relay 8 GPIO:</label></td>
              <td><input type="text" is="rs8gpio" name="rs8gpio" value="<!--#rs8gpio-->" <!--#rs8viz--> ></td>
          </tr>                                                                       
          <tr>            
              <td>
                  <button type="submit" style="font-size: 25px;">Save</button>
              </td>
          </tr>
      </form>
  </table>
  <br>
  <label>Relay changes will be applied after reboot</label>
  <form action="/reboot.cgi" method="get">
      <input type="submit" value="Reboot" name="reboot" id="reboot" style="font-size: 25px;">
  </form>   
</div>

</body>
</html>
